[book]
title = "vulkan_rs Guide"
authors = ["Johan Voskamp"]
description = "The definitive guide to Vulkan development with vulkan_rs"
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/Hiddentale/vulkan_rs"
edit-url-template = "https://github.com/Hiddentale/vulkan_rs/edit/main/guide/{path}"

[output.html.search]
enable = true
limit-results = 20
boost-hierarchy = 2
