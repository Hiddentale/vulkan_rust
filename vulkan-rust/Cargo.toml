[package]
name = "vulkan-rust"
version = "0.9.0"
edition = "2024"
rust-version = "1.85"
description = "Ergonomic Vulkan bindings for Rust, generated from vk.xml"
license = "MIT OR Apache-2.0"
readme = "../README.md"
documentation = "https://docs.rs/vulkan-rust"
repository = "https://github.com/Hiddentale/vulkan_rust"
authors = ["Johan Voskamp <55276630+Hiddentale@users.noreply.github.com>"]
keywords = ["vulkan", "graphics", "gpu", "wrapper", "safe"]
categories = ["api-bindings", "graphics", "rendering::graphics-api"]

[features]
default = ["surface"]
surface = ["dep:raw-window-handle"]

[dependencies]
vulkan-rust-sys = { path = "../vulkan-rust-sys" }
libloading = "0.8"
raw-window-handle = { version = "0.6", optional = true }

[dev-dependencies]
winit = "0.30"
image = "0.25"
