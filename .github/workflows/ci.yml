name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  commit-lint:
    name: Commit Message Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          VALID_TYPES="feat|fix|refactor|docs|chore|test|style|perf|ci|build|revert"
          PATTERN="^(${VALID_TYPES})(\(.+\))?\!?: .+"
          ERRORS=0

          for COMMIT in $(git log --no-merges origin/${{ github.base_ref }}..HEAD --format='%H'); do
            MSG=$(git log --format='%s' -n 1 "$COMMIT")
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: '$MSG'"
              echo "  Expected format: type(scope): description"
              echo "  Valid types: feat, fix, refactor, docs, chore, test, style, perf, ci, build, revert"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS commit(s) do not follow Conventional Commits format."
            exit 1
          fi

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        run: cargo audit

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build & Test (${{ matrix.os }})
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            install: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev
          - os: macos-latest
            install: ""
          - os: windows-latest
            install: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  doc-check:
    name: Documentation Check
    needs: [fmt, clippy, generator-determinism]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check docs build without warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

      - name: Run doc tests
        run: cargo test --doc --all-features

  doc-coverage:
    name: Documentation Coverage
    needs: [fmt, clippy, generator-determinism]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Check doc coverage meets threshold
        run: |
          RUSTDOCFLAGS="-Z unstable-options --show-coverage" cargo +nightly doc --no-deps -p vk-engine 2>&1 | tee coverage.txt
          TOTAL_LINE=$(grep '| Total' coverage.txt | head -1)
          PERCENT=$(echo "$TOTAL_LINE" | awk -F'|' '{print $4}' | tr -d ' %')
          echo "vk-engine doc coverage: ${PERCENT}%"
          THRESHOLD=100
          if [ "$(echo "$PERCENT < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::vk-engine doc coverage ${PERCENT}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

  test-coverage:
    name: Test Coverage
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(vk-sys/src/|vk-engine/src/generated/)'

      - name: Print coverage summary
        run: |
          cargo llvm-cov --workspace --no-run \
            --ignore-filename-regex '(vk-sys/src/|vk-engine/src/generated/)'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: lcov.info

  vulkan-runtime-tests:
    name: Vulkan Runtime Tests (lavapipe)
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies and lavapipe
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev \
            mesa-vulkan-drivers vulkan-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Find lavapipe ICD and verify
        run: |
          # Find the actual ICD file path (varies by Ubuntu version)
          LVP_ICD=$(find /usr/share/vulkan /etc/vulkan -name '*lvp*' -o -name '*lavapipe*' 2>/dev/null | head -1)
          if [ -z "$LVP_ICD" ]; then
            echo "::warning::Lavapipe ICD not found, listing available ICDs:"
            find /usr/share/vulkan /etc/vulkan -name '*.json' 2>/dev/null
            exit 1
          fi
          echo "Found lavapipe ICD: $LVP_ICD"
          echo "LVP_ICD=$LVP_ICD" >> "$GITHUB_ENV"
          VK_ICD_FILENAMES="$LVP_ICD" vulkaninfo --summary

      - name: Run ignored tests (requires Vulkan runtime)
        run: |
          export VK_ICD_FILENAMES="$LVP_ICD"
          cargo test --workspace -- --ignored --test-threads=1

  layout-cross-validation:
    name: C ↔ Rust Layout Validation
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libxcb1-dev libxkbcommon-dev

      - name: Install matching Vulkan headers
        run: |
          # Extract the exact version from our vk.xml so we compile against
          # the same spec revision we generate from. Mismatch = false failures.
          VK_PATCH=$(grep '<name>VK_HEADER_VERSION</name>' generator/vk.xml \
            | head -1 | grep -oP '\d+(?=</type>)')
          VK_TAG="v1.4.${VK_PATCH}"
          echo "Our vk.xml is version 1.4.${VK_PATCH}, checking out Vulkan-Headers at ${VK_TAG}"

          git clone --depth 1 --branch "${VK_TAG}" \
            https://github.com/KhronosGroup/Vulkan-Headers.git /tmp/vulkan-headers

          sudo rm -rf /usr/include/vulkan /usr/include/vk_video
          sudo cp -r /tmp/vulkan-headers/include/vulkan /usr/include/vulkan
          sudo cp -r /tmp/vulkan-headers/include/vk_video /usr/include/vk_video

          # Self-check: verify the installed headers match our vk.xml
          INSTALLED=$(grep -oP 'VK_HEADER_VERSION \K\d+' /usr/include/vulkan/vulkan_core.h | head -1)
          if [ "$INSTALLED" != "$VK_PATCH" ]; then
            echo "::error::Header version mismatch: installed=${INSTALLED}, expected=${VK_PATCH}"
            exit 1
          fi
          echo "Verified: C headers and vk.xml both at version 1.4.${VK_PATCH}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Compile C layout checker
        run: cc -o c_layout_check vk-sys/tests/c_layout_check.c -I/usr/include

      - name: Generate C layout output
        run: ./c_layout_check > c_layouts.txt

      - name: Generate Rust layout output
        run: cargo run --bin rust_layout_check > rust_layouts.txt

      - name: Cross-validate layouts
        run: |
          if ! diff c_layouts.txt rust_layouts.txt; then
            echo "::error::Rust struct layouts disagree with C Vulkan headers!"
            echo "Lines above show the differences. Left = C, Right = Rust."
            exit 1
          fi
          STRUCT_COUNT=$(wc -l < c_layouts.txt)
          echo "All ${STRUCT_COUNT} struct layouts match between C and Rust"

  generator-determinism:
    name: Generator Determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Re-run generator and check for diffs
        run: |
          cargo run -p generator
          if ! git diff --quiet; then
            echo "::error::Generated files are stale. Run 'cargo run -p generator' and commit the output."
            git diff --stat
            exit 1
          fi
          echo "Generated files are up to date"

  fuzz:
    name: Fuzz Testing
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vk-engine/fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz cast_to_u32 (60s)
        run: cd vk-engine && cargo +nightly fuzz run fuzz_cast_to_u32 -- -max_total_time=60

      - name: Fuzz entry_loader (60s)
        run: cd vk-engine && cargo +nightly fuzz run fuzz_entry_loader -- -max_total_time=60

  guide-build:
    name: Guide Build (mdBook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build guide
        run: cd guide && mdbook build

  guide-deploy:
    name: Deploy Guide to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [guide-build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build guide
        run: cd guide && mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: guide/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
