name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  commit-lint:
    name: Commit Message Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          VALID_TYPES="feat|fix|refactor|docs|chore|test|style|perf|ci|build|revert"
          PATTERN="^(${VALID_TYPES})(\(.+\))?\!?: .+"
          ERRORS=0

          for COMMIT in $(git log --no-merges origin/${{ github.base_ref }}..HEAD --format='%H'); do
            MSG=$(git log --format='%s' -n 1 "$COMMIT")
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: '$MSG'"
              echo "  Expected format: type(scope): description"
              echo "  Valid types: feat, fix, refactor, docs, chore, test, style, perf, ci, build, revert"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS commit(s) do not follow Conventional Commits format."
            exit 1
          fi

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            install: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev
          - os: macos-latest
            install: ""
          - os: windows-latest
            install: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  doc-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Regenerate bindings
        run: cargo run -p generator

      - name: Check docs build without warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

      - name: Run doc tests
        run: cargo test --doc --all-features

  doc-coverage:
    name: Documentation Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Regenerate bindings
        run: cargo run -p generator

      - name: Report doc coverage
        run: |
          RUSTDOCFLAGS="-Z unstable-options --show-coverage" cargo +nightly doc --no-deps -p vk-engine 2>&1 | tee coverage.txt
          echo "---"
          RUSTDOCFLAGS="-Z unstable-options --show-coverage" cargo +nightly doc --no-deps -p vk-sys 2>&1 | tee -a coverage.txt

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(vk-sys/src/|vk-engine/src/generated/)'

      - name: Print coverage summary
        run: |
          cargo llvm-cov --workspace --no-run \
            --ignore-filename-regex '(vk-sys/src/|vk-engine/src/generated/)'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: lcov.info

  vulkan-runtime-tests:
    name: Vulkan Runtime Tests (lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies and lavapipe
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev \
            mesa-vulkan-drivers vulkan-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Find lavapipe ICD and verify
        run: |
          # Find the actual ICD file path (varies by Ubuntu version)
          LVP_ICD=$(find /usr/share/vulkan /etc/vulkan -name '*lvp*' -o -name '*lavapipe*' 2>/dev/null | head -1)
          if [ -z "$LVP_ICD" ]; then
            echo "::warning::Lavapipe ICD not found, listing available ICDs:"
            find /usr/share/vulkan /etc/vulkan -name '*.json' 2>/dev/null
            exit 1
          fi
          echo "Found lavapipe ICD: $LVP_ICD"
          echo "LVP_ICD=$LVP_ICD" >> "$GITHUB_ENV"
          VK_ICD_FILENAMES="$LVP_ICD" vulkaninfo --summary

      - name: Run ignored tests (requires Vulkan runtime)
        run: |
          export VK_ICD_FILENAMES="$LVP_ICD"
          cargo test --workspace -- --ignored --test-threads=1

  layout-cross-validation:
    name: C ↔ Rust Layout Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install matching Vulkan headers
        run: |
          # System headers may be older than our vk.xml. Install latest
          # Vulkan-Headers to ensure all types are defined.
          git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git /tmp/vulkan-headers
          sudo cp -r /tmp/vulkan-headers/include/vulkan /usr/include/vulkan

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Compile C layout checker
        run: cc -o c_layout_check vk-sys/tests/c_layout_check.c -I/usr/include

      - name: Generate C layout output
        run: ./c_layout_check > c_layouts.txt

      - name: Generate Rust layout output
        run: cargo run --bin rust_layout_check > rust_layouts.txt

      - name: Cross-validate layouts
        run: |
          if ! diff c_layouts.txt rust_layouts.txt; then
            echo "::error::Rust struct layouts disagree with C Vulkan headers!"
            echo "Lines above show the differences. Left = C, Right = Rust."
            exit 1
          fi
          STRUCT_COUNT=$(wc -l < c_layouts.txt)
          echo "All ${STRUCT_COUNT} struct layouts match between C and Rust"

  generator-determinism:
    name: Generator Determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libvulkan-dev libxcb1-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Re-run generator and check for diffs
        run: |
          cargo run -p generator
          if ! git diff --quiet; then
            echo "::error::Generated files are stale. Run 'cargo run -p generator' and commit the output."
            git diff --stat
            exit 1
          fi
